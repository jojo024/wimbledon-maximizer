<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wimbledon$ Maximizer — Tips &amp; Tricks</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
  <h2 class="section-title">Tips &amp; Tricks</h2>
  <p class="section-sub">Share what's helped you maximize your Wimbledons. React to the ones that worked (or didn't) for you — best tips rise to the top by score (&#9650; minus &#9660;).</p>

  <div class="ticker-wrap" id="ticker" style="display:none">
    <div class="ticker-track" id="ticker-track"></div>
  </div>

  <div class="panel" style="max-width:640px;margin:0 auto 24px">
    <form id="tip-form" style="display:flex;flex-direction:column;gap:10px">
      <textarea name="text" placeholder="Share a tip…" required maxlength="500" rows="3"></textarea>
      <div id="identity-slot"></div>
      <button class="btn btn-green">Post tip</button>
    </form>
  </div>

  <div id="tip-list" style="max-width:640px;margin:0 auto"></div>
</main>

<script type="module">
import { renderNav, api, esc, toast, getSession, ensureNamed, identityLine, connectFeed } from "/static/wim.js";
renderNav("/tips");

const REACTIONS = [
  ["up", "&#9650;", "Upvote"],
  ["down", "&#9660;", "Downvote"],
  ["fire", "&#128293;", "Fire"],
  ["heart", "&#10084;&#65039;", "Love it"],
  ["laugh", "&#128514;", "Funny"],
  ["cry", "&#128546;", "Sad"],
];

let tips = [];
const listEl = document.getElementById("tip-list");
const identitySlot = document.getElementById("identity-slot");
const tickerWrap = document.getElementById("ticker");
const tickerTrack = document.getElementById("ticker-track");

const TICKER_SIZE = 8;
let lastTickerKey = "";

function sortTips() {
  tips.sort((a, b) => b.score - a.score || b.id - a.id);
}

function truncate(s, n) {
  return s.length > n ? s.slice(0, n - 1) + "…" : s;
}

// Top tips crawl in a separate marquee; keyed on the visible id order so an
// unrelated reaction elsewhere doesn't restart the scroll mid-loop.
function renderTicker() {
  const top = tips.slice(0, TICKER_SIZE);
  if (!top.length) { tickerWrap.style.display = "none"; return; }
  const key = top.map(t => t.id).join(",");
  tickerWrap.style.display = "block";
  if (key === lastTickerKey) return;
  lastTickerKey = key;
  const itemsHtml = top.map((t, i) => `
    <span class="ticker-item">
      <span class="t-rank">#${i + 1}</span>
      <span class="t-score">${t.score > 0 ? "+" : ""}${t.score}</span>
      <span class="t-text">${esc(truncate(t.text, 90))}</span>
    </span>`).join("");
  tickerTrack.innerHTML = itemsHtml + itemsHtml;
}

function reactionBar(t) {
  return REACTIONS.map(([key, glyph, label]) => `
    <button class="react-btn${t.my_reactions.includes(key) ? " active" : ""}" data-r="${key}" title="${label}">
      ${glyph}<span>${t.counts[key]}</span>
    </button>`).join("");
}

function render() {
  listEl.innerHTML = tips.length
    ? tips.map((t, i) => `
        <div class="comment${t.score > 0 && i === 0 ? " top" : ""}" data-id="${t.id}">
          <div class="reactions">${reactionBar(t)}</div>
          <div class="ctext"><span class="cauthor">${esc(t.author)}</span>${esc(t.text)}</div>
        </div>`).join("")
    : `<span class="empty-hint">No tips yet — be the first to share one.</span>`;
  renderTicker();
}

listEl.addEventListener("click", async e => {
  const btn = e.target.closest("[data-r]");
  if (!btn) return;
  const id = Number(btn.closest("[data-id]").dataset.id);
  const reaction = btn.dataset.r;
  try {
    const res = await api("POST", `/api/tips/${id}/react`, { reaction });
    const tip = tips.find(t => t.id === id);
    tip.counts = res.counts;
    tip.score = res.counts.up - res.counts.down;
    tip.my_reactions = res.mine
      ? [...tip.my_reactions, reaction]
      : tip.my_reactions.filter(r => r !== reaction);
    sortTips();
    render();
  } catch (err) { toast(err.message, true); }
});

document.getElementById("tip-form").addEventListener("submit", async e => {
  e.preventDefault();
  const text = e.target.text.value.trim();
  if (!text) return;
  const name = await ensureNamed();
  if (!name) return;
  try {
    await api("POST", "/api/tips", { text });
    e.target.text.value = "";
    toast("Tip posted!");
    tips = await api("GET", "/api/tips");
    sortTips();
    render();
  } catch (err) { toast(err.message, true); }
});

connectFeed(ev => {
  if (ev.type === "tip_new") {
    if (!tips.some(t => t.id === ev.tip.id)) {
      tips.push(ev.tip);
      sortTips();
      render();
    }
  } else if (ev.type === "tip_react") {
    const tip = tips.find(t => t.id === ev.tip_id);
    if (tip) {
      tip.counts = ev.counts;
      tip.score = ev.score;
      sortTips();
      render();
    }
  } else if (ev.type === "tip_update") {
    const tip = tips.find(t => t.id === ev.tip_id);
    if (tip) {
      tip.author = ev.author;
      tip.text = ev.text;
      render();
    }
  } else if (ev.type === "tip_delete") {
    const i = tips.findIndex(t => t.id === ev.tip_id);
    if (i !== -1) { tips.splice(i, 1); render(); }
  }
});

tips = await api("GET", "/api/tips");
sortTips();
render();

const session = await getSession();
identitySlot.innerHTML = identityLine(session.name || "not set yet");
</script>
</body>
</html>
