<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wimbledon$ Maximizer — Admin</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
  <h2 class="section-title">Admin console</h2>
  <p class="section-sub">Edit the entire database: meals, combos, ratings, comments, daily deals, and tips.</p>

  <div class="panel" id="login-panel" style="max-width:420px">
    <label class="f">Admin key
      <input type="password" id="admin-key" placeholder="Enter admin key">
    </label>
    <button class="btn btn-green" id="login-btn" style="margin-top:12px">Unlock</button>
  </div>

  <div id="console" style="display:none">
    <div class="tabs">
      <button data-tab="meals" class="active">Meals</button>
      <button data-tab="combos">Combos</button>
      <button data-tab="deals">Daily Deals</button>
      <button data-tab="comments">Comments</button>
      <button data-tab="tips">Tips</button>
    </div>
    <div class="panel table-scroll" id="tab-content"></div>
  </div>
</main>

<script type="module">
import { renderNav, api, esc, fmtW, toast } from "/static/wim.js";
renderNav("/admin");

let KEY = sessionStorage.getItem("wim_admin_key") || "";
let tab = "meals";
let meals = [];
let newComboItems = [];
const content = document.getElementById("tab-content");

async function unlock(key) {
  await api("GET", "/api/admin/verify", undefined, key);
  KEY = key;
  sessionStorage.setItem("wim_admin_key", key);
  document.getElementById("login-panel").style.display = "none";
  document.getElementById("console").style.display = "block";
  loadTab();
}

document.getElementById("login-btn").onclick = async () => {
  try { await unlock(document.getElementById("admin-key").value); }
  catch { toast("Invalid admin key", true); }
};
document.getElementById("admin-key").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("login-btn").click();
});

document.querySelector(".tabs").addEventListener("click", e => {
  const btn = e.target.closest("button[data-tab]");
  if (!btn) return;
  tab = btn.dataset.tab;
  document.querySelectorAll(".tabs button").forEach(b => b.classList.toggle("active", b === btn));
  loadTab();
});

const TARGET = 3000;

function itemRow(emoji = "", name = "", priceCents = 0, qty = 1) {
  return `<div class="ie-row">
    <input class="ie-emoji" data-f="emoji" value="${esc(emoji)}" maxlength="8" placeholder="🍽">
    <input class="ie-name" data-f="meal_name" value="${esc(name)}" maxlength="60" placeholder="Item name">
    <input class="ie-price" data-f="price" type="number" step="0.01" min="0.01" value="${fmtW(priceCents)}" title="Price in Wimbledons">
    <input class="ie-qty" data-f="qty" type="number" min="1" max="20" value="${qty}" title="Quantity">
    <button class="btn btn-sm btn-danger" data-act="rm-item" title="Remove">&times;</button>
  </div>`;
}

function itemEditor(items) {
  return `<div class="item-editor">
    <div class="ie-rows">${items.map(i => itemRow(i.emoji, i.meal_name, i.price_cents, i.qty)).join("")}</div>
    <div class="ie-foot">
      <button class="btn btn-sm" data-act="add-item">+ Add item</button>
      <span class="ie-total"></span>
      <button class="btn btn-sm btn-green" data-act="save-items" disabled>Save items</button>
    </div>
  </div>`;
}

function mealOptions() {
  return meals.map(m => `<option value="${m.id}">${esc(m.emoji)} ${esc(m.name)} — ${fmtW(m.price_cents)}</option>`).join("");
}

// Render the picked-items list for the new honourable-mention combo form,
// mirroring builder.html's basket-row/qty-controls pattern (dec/inc buttons,
// not typable inputs, so nothing loses focus on re-render).
function renderNewComboRows() {
  const rowsEl = document.getElementById("new-combo-rows");
  const totalEl = document.getElementById("new-combo-total");
  const createBtn = document.querySelector('#new-combo-form [data-act="create-combo"]');
  rowsEl.innerHTML = newComboItems.length === 0
    ? `<span class="empty-hint">No items picked yet.</span>`
    : newComboItems.map((it, idx) => `<div class="basket-row" data-idx="${idx}">
        <span class="emoji">${esc(it.emoji)}</span>
        <span class="bname">${esc(it.name)}</span>
        <span class="qty-controls">
          <button type="button" class="qbtn" data-act="pick-dec">&minus;</button>
          <span>${it.qty}</span>
          <button type="button" class="qbtn" data-act="pick-inc">+</button>
        </span>
        ${fmtW(it.price_cents * it.qty)}
        <button type="button" class="btn btn-sm btn-danger" data-act="pick-rm" title="Remove">&times;</button>
      </div>`).join("");
  const total = newComboItems.reduce((s, it) => s + it.price_cents * it.qty, 0);
  const off = total - TARGET;
  totalEl.textContent = off === 0
    ? `${fmtW(total)} — exactly 30 Wimbledons`
    : `${fmtW(total)} Wimbledons (${off > 0 ? "+" : ""}${fmtW(off)})`;
  totalEl.classList.toggle("ok", off === 0);
  createBtn.disabled = off !== 0;
}

// Collect {price_cents, qty} and update the live total + save button for one editor.
function recomputeEditor(editor) {
  let total = 0;
  editor.querySelectorAll(".ie-row").forEach(row => {
    const price = Math.round(Number(row.querySelector(".ie-price").value) * 100) || 0;
    const qty = Number(row.querySelector(".ie-qty").value) || 0;
    total += price * qty;
  });
  const label = editor.querySelector(".ie-total");
  const off = total - TARGET;
  label.textContent = off === 0
    ? `${fmtW(total)} — exactly 30 Wimbledons`
    : `${fmtW(total)} Wimbledons (${off > 0 ? "+" : ""}${fmtW(off)})`;
  label.classList.toggle("ok", off === 0);
  editor.querySelector('[data-act="save-items"]').disabled = off !== 0;
  return total;
}

async function loadTab() {
  if (tab === "meals") {
    const meals = await api("GET", "/api/meals");
    content.innerHTML = `<table class="admin">
      <tr><th>ID</th><th>Emoji</th><th>Name</th><th>Price (Wimbledons)</th><th>Added by</th><th></th></tr>
      ${meals.map(m => `<tr data-id="${m.id}">
        <td>${m.id}</td>
        <td class="narrow"><input value="${esc(m.emoji)}" data-f="emoji" style="font-size:1.2rem"></td>
        <td><input value="${esc(m.name)}" data-f="name"></td>
        <td class="narrow"><input type="number" step="0.01" value="${fmtW(m.price_cents)}" data-f="price"></td>
        <td>${esc(m.created_by || "")}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-sm" data-act="save-meal">Save</button>
          <button class="btn btn-sm btn-danger" data-act="del-meal">Delete</button>
        </td></tr>`).join("")}
    </table>`;
  } else if (tab === "combos") {
    const [combos, allMeals] = await Promise.all([
      api("GET", "/api/combos"), api("GET", "/api/meals"),
    ]);
    meals = allMeals;
    newComboItems = [];
    content.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <span class="section-sub" style="margin:0">Funky admin-only combos flagged "honourable mention" — shown separately on the leaderboard, never counted in the ranking.</span>
        <button class="btn btn-sm" data-act="toggle-new-combo" style="white-space:nowrap">+ New honourable mention</button>
      </div>
      <div id="new-combo-form" style="display:none;margin-bottom:18px;padding-bottom:14px;border-bottom:1px dashed rgba(139,92,246,0.25)">
        <div style="display:flex;gap:10px;margin-bottom:10px">
          <input id="new-combo-name" placeholder="Combo name" style="flex:1">
          <input id="new-combo-author" placeholder="Author (e.g. Admin)" style="flex:1">
        </div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <select id="new-combo-picker" style="flex:1">${mealOptions()}</select>
          <input id="new-combo-qty" type="number" min="1" max="20" value="1" style="width:70px" title="Quantity">
          <button type="button" class="btn btn-sm" data-act="pick-add">+ Add</button>
        </div>
        <div class="basket-list" id="new-combo-rows"></div>
        <div class="ie-foot">
          <span class="ie-total" id="new-combo-total"></span>
          <button class="btn btn-sm btn-green" data-act="create-combo" disabled>Create</button>
        </div>
      </div>
      <table class="admin">
      <tr><th>ID</th><th>Name</th><th>Author</th><th>Items</th><th>Rating</th><th></th></tr>
      ${combos.map(c => `<tr data-id="${c.id}">
        <td>${c.id}</td>
        <td>${c.honourable ? `<span class="honourable-tag" title="Honourable mention — not part of the ranking">&#127942;</span>` : ""}<input value="${esc(c.name)}" data-f="name"></td>
        <td><input value="${esc(c.author)}" data-f="author"></td>
        <td>${c.items.map(i => `${esc(i.emoji)}${i.qty > 1 ? "&times;" + i.qty : ""}`).join(" ")}</td>
        <td>${c.rating_avg ? c.rating_avg.toFixed(1) : "–"} (${c.rating_count})</td>
        <td style="white-space:nowrap">
          <button class="btn btn-sm" data-act="save-combo">Save</button>
          <button class="btn btn-sm" data-act="edit-items">Items</button>
          <button class="btn btn-sm" data-act="clear-ratings">Reset ratings</button>
          <button class="btn btn-sm btn-danger" data-act="del-combo">Delete</button>
        </td></tr>
        <tr class="combo-editor" data-editor="${c.id}" style="display:none">
          <td colspan="6">${itemEditor(c.items)}</td>
        </tr>`).join("")}
    </table>`;
  } else if (tab === "deals") {
    const deals = await api("GET", "/api/admin/deals", undefined, KEY);
    content.innerHTML = deals.length ? `<table class="admin">
      <tr><th>ID</th><th>Player</th><th>Date</th><th>Total</th><th>Distance</th><th></th></tr>
      ${deals.map(d => `<tr data-id="${d.id}">
        <td>${d.id}</td><td>${esc(d.name)}</td><td>${esc(d.deal_date)}</td>
        <td>${fmtW(d.total_cents)}</td>
        <td>${d.distance_cents === 0 ? "exact!" : fmtW(d.distance_cents)}</td>
        <td><button class="btn btn-sm btn-danger" data-act="del-deal">Delete</button></td>
      </tr>`).join("")}
    </table>` : `<span class="empty-hint">No daily deals logged yet.</span>`;
  } else if (tab === "tips") {
    const tips = await api("GET", "/api/admin/tips", undefined, KEY);
    content.innerHTML = tips.length ? `<table class="admin">
      <tr><th>ID</th><th>Author</th><th>Text</th><th>Score</th><th>Reactions</th><th>When</th><th></th></tr>
      ${tips.map(t => `<tr data-id="${t.id}">
        <td>${t.id}</td>
        <td><input value="${esc(t.author)}" data-f="author"></td>
        <td><input value="${esc(t.text)}" data-f="text"></td>
        <td>${t.score > 0 ? "+" + t.score : t.score}</td>
        <td>${t.total_reactions}</td>
        <td>${esc(t.created_at)}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-sm" data-act="save-tip">Save</button>
          <button class="btn btn-sm btn-danger" data-act="del-tip">Delete</button>
        </td>
      </tr>`).join("")}
    </table>` : `<span class="empty-hint">No tips in the database.</span>`;
  } else {
    const comments = await api("GET", "/api/admin/comments", undefined, KEY);
    content.innerHTML = comments.length ? `<table class="admin">
      <tr><th>ID</th><th>Combo</th><th>Author</th><th>Text</th><th>When</th><th></th></tr>
      ${comments.map(c => `<tr data-id="${c.id}">
        <td>${c.id}</td><td>${esc(c.combo_name)}</td>
        <td><input value="${esc(c.author)}" data-f="author"></td>
        <td><input value="${esc(c.text)}" data-f="text"></td>
        <td>${esc(c.created_at)}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-sm" data-act="save-comment">Save</button>
          <button class="btn btn-sm btn-danger" data-act="del-comment">Delete</button>
        </td>
      </tr>`).join("")}
    </table>` : `<span class="empty-hint">No comments in the database.</span>`;
  }
}

// live total as prices/quantities are typed in an open item editor
content.addEventListener("input", e => {
  const editor = e.target.closest(".item-editor");
  if (editor) recomputeEditor(editor);
});

content.addEventListener("click", async e => {
  const btn = e.target.closest("button[data-act]");
  if (!btn) return;
  const act = btn.dataset.act;

  if (act === "toggle-new-combo") {
    const form = document.getElementById("new-combo-form");
    const show = form.style.display === "none";
    form.style.display = show ? "block" : "none";
    if (show) { newComboItems = []; renderNewComboRows(); }
    return;
  }

  // combo item-editor actions here only ever apply to an EXISTING combo's
  // items (inside a tr.combo-editor row) — creating a new honourable mention
  // uses the meal-picker actions below instead.
  if (act === "add-item" || act === "rm-item" || act === "save-items") {
    e.preventDefault();
    const editor = btn.closest(".item-editor");
    const editorRow = btn.closest("tr.combo-editor");
    if (act === "add-item") {
      editor.querySelector(".ie-rows").insertAdjacentHTML("beforeend", itemRow());
      recomputeEditor(editor);
    } else if (act === "rm-item") {
      btn.closest(".ie-row").remove();
      recomputeEditor(editor);
    } else {
      const items = [...editor.querySelectorAll(".ie-row")].map(r => ({
        emoji: r.querySelector(".ie-emoji").value.trim(),
        meal_name: r.querySelector(".ie-name").value.trim(),
        price_cents: Math.round(Number(r.querySelector(".ie-price").value) * 100),
        qty: Number(r.querySelector(".ie-qty").value),
      }));
      try {
        const cid = Number(editorRow.dataset.editor);
        await api("PUT", `/api/admin/combos/${cid}/items`, { items }, KEY);
        toast("Combo items saved"); loadTab();
      } catch (err) { toast(err.message, true); }
    }
    return;
  }

  // meal-picker actions for creating a new honourable-mention combo — emoji,
  // name, and price always come from the selected meal record, never typed.
  if (act === "pick-add") {
    e.preventDefault();
    const sel = document.getElementById("new-combo-picker");
    const qtyInput = document.getElementById("new-combo-qty");
    const mealId = Number(sel.value);
    const qty = Math.max(1, Number(qtyInput.value) || 1);
    const meal = meals.find(m => m.id === mealId);
    if (!meal) return;
    const existing = newComboItems.find(it => it.meal_id === mealId);
    if (existing) existing.qty += qty;
    else newComboItems.push({ meal_id: mealId, emoji: meal.emoji, name: meal.name, price_cents: meal.price_cents, qty });
    qtyInput.value = 1;
    renderNewComboRows();
    return;
  }
  if (act === "pick-dec" || act === "pick-inc" || act === "pick-rm") {
    e.preventDefault();
    const idx = Number(btn.closest(".basket-row").dataset.idx);
    if (act === "pick-inc") newComboItems[idx].qty++;
    else if (act === "pick-dec") {
      newComboItems[idx].qty--;
      if (newComboItems[idx].qty <= 0) newComboItems.splice(idx, 1);
    } else newComboItems.splice(idx, 1);
    renderNewComboRows();
    return;
  }
  if (act === "create-combo") {
    e.preventDefault();
    const name = document.getElementById("new-combo-name").value.trim();
    const author = document.getElementById("new-combo-author").value.trim();
    if (!name || !author) { toast("Name and author are required", true); return; }
    const items = newComboItems.map(it => ({
      emoji: it.emoji, meal_name: it.name, price_cents: it.price_cents, qty: it.qty,
    }));
    try {
      await api("POST", "/api/admin/combos", { name, author, items }, KEY);
      toast("Honourable mention created"); loadTab();
    } catch (err) { toast(err.message, true); }
    return;
  }

  const row = btn.closest("tr");
  const id = Number(row.dataset.id);
  const val = f => row.querySelector(`[data-f="${f}"]`).value;
  try {
    switch (act) {
      case "save-meal":
        await api("PUT", `/api/admin/meals/${id}`,
          { name: val("name"), emoji: val("emoji"), price: Number(val("price")) }, KEY);
        toast("Meal saved"); break;
      case "del-meal":
        if (!confirm("Delete this meal? Existing combos keep their snapshot of it.")) return;
        await api("DELETE", `/api/admin/meals/${id}`, undefined, KEY);
        toast("Meal deleted"); loadTab(); break;
      case "save-combo":
        await api("PUT", `/api/admin/combos/${id}`,
          { name: val("name"), author: val("author") }, KEY);
        toast("Combo saved"); break;
      case "edit-items": {
        const editorRow = content.querySelector(`tr.combo-editor[data-editor="${id}"]`);
        const show = editorRow.style.display === "none";
        editorRow.style.display = show ? "table-row" : "none";
        if (show) recomputeEditor(editorRow.querySelector(".item-editor"));
        break;
      }
      case "clear-ratings":
        if (!confirm("Reset all ratings for this combo?")) return;
        await api("DELETE", `/api/admin/ratings/${id}`, undefined, KEY);
        toast("Ratings reset"); loadTab(); break;
      case "del-combo":
        if (!confirm("Delete this combo with its ratings and comments?")) return;
        await api("DELETE", `/api/admin/combos/${id}`, undefined, KEY);
        toast("Combo deleted"); loadTab(); break;
      case "save-comment":
        await api("PUT", `/api/admin/comments/${id}`,
          { author: val("author"), text: val("text") }, KEY);
        toast("Comment saved"); break;
      case "del-comment":
        await api("DELETE", `/api/admin/comments/${id}`, undefined, KEY);
        toast("Comment deleted"); loadTab(); break;
      case "del-deal":
        if (!confirm("Delete this daily deal entry?")) return;
        await api("DELETE", `/api/admin/deals/${id}`, undefined, KEY);
        toast("Deal deleted"); loadTab(); break;
      case "save-tip":
        await api("PUT", `/api/admin/tips/${id}`,
          { author: val("author"), text: val("text") }, KEY);
        toast("Tip saved"); break;
      case "del-tip":
        await api("DELETE", `/api/admin/tips/${id}`, undefined, KEY);
        toast("Tip deleted"); loadTab(); break;
    }
  } catch (err) { toast(err.message, true); }
});

if (KEY) unlock(KEY).catch(() => { KEY = ""; sessionStorage.removeItem("wim_admin_key"); });
</script>
</body>
</html>
