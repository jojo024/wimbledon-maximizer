<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wimbledon$ Maximizer — Basket Builder</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
  <h2 class="section-title">Basket Builder</h2>
  <p class="section-sub">Drag floating meals into the basket. Any total logs today's
    <strong>Daily Deal</strong> — see how you rank on <a href="/players" style="color:var(--green-neon)">Players</a>.
    Land on <strong>exactly 30 Wimbledons</strong> and it also enters the competition leaderboard.</p>

  <div class="builder-layout" style="display:grid;grid-template-columns:1.6fr 1fr;gap:24px;align-items:start">
    <div class="arena" id="arena">
      <div class="basket" id="basket">
        <span>&#129530;</span>
        <span class="hint">drop meals here</span>
      </div>
    </div>

    <div class="panel">
      <h3 style="margin:0 0 4px">Your basket</h3>
      <div class="meter-wrap">
        <div class="meter" id="meter"><div class="fill" id="meter-fill"></div></div>
        <div class="meter-label">
          <span class="total-now" id="total-label"></span>
          <span id="status-label"></span>
        </div>
      </div>
      <div class="basket-list" id="basket-list"></div>

      <form id="submit-form" style="display:flex;flex-direction:column;gap:10px;margin-top:16px">
        <label class="f" id="name-field">Combo name <span id="name-hint" class="empty-hint"></span>
          <input name="name" placeholder="e.g. Midnight Ramen Run" maxlength="60">
        </label>
        <div id="identity-slot"></div>
        <button class="btn btn-green" id="submit-btn" disabled>Add something to your basket</button>
      </form>
    </div>
  </div>
</main>

<script type="module">
import { renderNav, api, esc, wim, fmtW, toast, getSession, ensureNamed,
         identityLine, initFloatingBasket } from "/static/wim.js";
renderNav("/builder");

const TARGET = 3000;
const VIS_CAP = TARGET * 2; // meter bar visualizes up to 60 Wimbledons
const arena = document.getElementById("arena");
const basketEl = document.getElementById("basket");
const listEl = document.getElementById("basket-list");
const meterEl = document.getElementById("meter");
const fillEl = document.getElementById("meter-fill");
const totalLabel = document.getElementById("total-label");
const statusLabel = document.getElementById("status-label");
const submitBtn = document.getElementById("submit-btn");
const identitySlot = document.getElementById("identity-slot");
const nameInput = document.querySelector('#submit-form [name=name]');
const nameHint = document.getElementById("name-hint");

let meals = [];
const basket = new Map(); // meal_id -> qty

function total() {
  let t = 0;
  for (const [id, qty] of basket) t += meals.find(m => m.id === id).price_cents * qty;
  return t;
}

function renderBasket() {
  const t = total();
  const exact = t === TARGET;
  listEl.innerHTML = basket.size === 0
    ? `<span class="empty-hint">Basket is empty — drag something in.</span>`
    : [...basket].map(([id, qty]) => {
        const m = meals.find(x => x.id === id);
        return `<div class="basket-row" data-id="${id}">
          <span class="emoji">${esc(m.emoji)}</span>
          <span class="bname">${esc(m.name)}</span>
          <span class="qty-controls">
            <button class="qbtn" data-act="dec">&minus;</button>
            <span>${qty}</span>
            <button class="qbtn" data-act="inc">+</button>
          </span>
          ${wim(m.price_cents * qty)}
        </div>`;
      }).join("");

  const pct = Math.min(t / VIS_CAP, 1) * 100;
  fillEl.style.width = pct + "%";
  meterEl.classList.toggle("exact", exact);
  totalLabel.innerHTML = `${wim(t)} today`;
  if (exact) {
    statusLabel.innerHTML = `<span class="exact-txt">EXACTLY 30 — enters the competition too!</span>`;
  } else if (t > TARGET) {
    statusLabel.innerHTML = `${fmtW(t - TARGET)} Wimbledons over 30`;
  } else if (t > 0) {
    statusLabel.innerHTML = `${fmtW(TARGET - t)} Wimbledons under 30`;
  } else {
    statusLabel.innerHTML = "";
  }

  nameInput.required = exact;
  nameHint.textContent = exact ? "" : "(only used if you hit exactly 30)";
  submitBtn.disabled = basket.size === 0;
  submitBtn.textContent = basket.size === 0
    ? "Add something to your basket"
    : exact ? "Enter competition + log today's deal" : "Log today's deal";
}

listEl.addEventListener("click", e => {
  const btn = e.target.closest(".qbtn");
  if (!btn) return;
  e.preventDefault();
  const id = Number(btn.closest(".basket-row").dataset.id);
  const qty = basket.get(id) + (btn.dataset.act === "inc" ? 1 : -1);
  if (qty <= 0) basket.delete(id); else basket.set(id, qty);
  renderBasket();
});

function addToBasket(id) {
  basket.set(id, (basket.get(id) || 0) + 1);
  basketEl.classList.remove("pop");
  void basketEl.offsetWidth; // restart animation
  basketEl.classList.add("pop");
  renderBasket();
}

// --- submit ---
// Always logs today's Daily Deal (any total). If the basket lands on exactly
// 30 Wimbledons, it *also* posts a named Combo to the competition leaderboard.

document.getElementById("submit-form").addEventListener("submit", async e => {
  e.preventDefault();
  if (basket.size === 0) return;
  const name = await ensureNamed();
  if (!name) return;
  const items = [...basket].map(([meal_id, qty]) => ({ meal_id, qty }));
  const exact = total() === TARGET;
  try {
    const deal = await api("POST", "/api/deals", { items });
    if (exact) {
      await api("POST", "/api/combos", { name: e.target.name.value.trim(), items });
      toast("Exactly 30! Entered the competition and logged today's deal.");
      setTimeout(() => location.href = "/", 1400);
    } else {
      toast(`Deal logged — W$${(deal.distance_cents / 100).toFixed(2)} away from 30.`);
      setTimeout(() => location.href = "/players", 1400);
    }
  } catch (err) { toast(err.message, true); }
});

meals = await api("GET", "/api/meals");
initFloatingBasket({ arena, basketEl, meals, onDrop: addToBasket });
renderBasket();

const session = await getSession();
identitySlot.innerHTML = identityLine(session.name || "not set yet");
</script>
</body>
</html>
