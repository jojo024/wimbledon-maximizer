<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wimbledon$ Maximizer — Add Meals</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
  <h2 class="section-title">Add a meal</h2>
  <p class="section-sub">Log what you ate today with its price in Wimbledons and an emoji.
    It goes straight into the shared meal pool everyone builds combos from.</p>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start" class="builder-layout">
    <form class="panel" id="meal-form" style="display:flex;flex-direction:column;gap:14px">
      <label class="f">Meal name
        <input name="name" placeholder="e.g. Katsu curry" required maxlength="60">
      </label>
      <label class="f">Price in Wimbledons (W$)
        <input name="price" type="number" step="0.5" min="0.5" max="30" placeholder="e.g. 7.5" required>
      </label>
      <label class="f">Pick an emoji
        <input name="emoji" placeholder="…or type any emoji here" maxlength="8" required style="font-size:1.3rem">
      </label>
      <div class="emoji-grid" id="emoji-grid"></div>
      <div id="identity-slot"></div>
      <button class="btn btn-green" style="margin-top:6px">Add to the meal pool</button>
    </form>

    <div class="panel">
      <h3 style="margin:0 0 4px">Meal pool</h3>
      <p class="section-sub" style="margin-bottom:4px">Everything available in the Basket Builder.</p>
      <div class="meal-chips" id="pool"></div>
    </div>
  </div>
</main>

<script type="module">
import { renderNav, api, esc, fmtW, toast, getSession, ensureNamed,
         identityLine, wireIdentityChange } from "/static/wim.js";
renderNav("/meals");

const EMOJIS = [
  "🥐","☕","🍜","🍣","🍕","🥗","🧋","🍔","🍎","🍩","🍓","🌮","🥑","🍦","🍟","🍇",
  "🍪","🥞","🍙","🍛","🍝","🌯","🥪","🍗","🥩","🍤","🥟","🍚","🍞","🧀","🥚","🥓",
  "🍅","🥕","🌽","🥦","🍌","🍊","🍉","🥭","🍑","🍒","🥤","🍺","🍷","🍰","🧁","🍫",
];

const grid = document.getElementById("emoji-grid");
const form = document.getElementById("meal-form");
grid.innerHTML = EMOJIS.map(e => `<button type="button" data-e="${e}">${e}</button>`).join("");

grid.addEventListener("click", e => {
  const btn = e.target.closest("button[data-e]");
  if (!btn) return;
  form.emoji.value = btn.dataset.e;
  grid.querySelectorAll("button").forEach(b => b.classList.toggle("sel", b === btn));
});

async function loadPool() {
  const meals = await api("GET", "/api/meals");
  document.getElementById("pool").innerHTML = meals.length
    ? meals.map(m => `<span class="meal-chip">
        <span class="emoji">${esc(m.emoji)}</span>${esc(m.name)}
        <span class="price">W$ ${fmtW(m.price_cents)}</span></span>`).join("")
    : `<span class="empty-hint">No meals yet.</span>`;
}

form.addEventListener("submit", async e => {
  e.preventDefault();
  const name = await ensureNamed();
  if (!name) return;
  try {
    await api("POST", "/api/meals", {
      name: form.name.value.trim(),
      emoji: form.emoji.value.trim(),
      price: Number(form.price.value),
    });
    toast(`${form.emoji.value} added for W$ ${fmtW(Math.round(form.price.value * 100))} Wimbledons`);
    form.reset();
    grid.querySelectorAll("button").forEach(b => b.classList.remove("sel"));
    loadPool();
  } catch (err) { toast(err.message, true); }
});

loadPool();

const identitySlot = document.getElementById("identity-slot");
const session = await getSession();
identitySlot.innerHTML = identityLine(session.name || "not set yet");
wireIdentityChange(identitySlot, name => {
  session.name = name;
  identitySlot.querySelector("b").textContent = name;
});
</script>
</body>
</html>
