<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wimbledon$ Maximizer — Players</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
  <h2 class="section-title">Players</h2>
  <p class="section-sub">Ranked by <strong>closeness to 30 Wimbledons</strong> — not who spent the
    most, who maximized best. Miss a day and it counts as W$0 toward your average, so streaks matter.
    Log today's meals on the <a href="/deals" style="color:var(--green-neon)">Daily Deal</a> page.</p>

  <div class="builder-layout" style="display:grid;grid-template-columns:1fr 1.3fr;gap:24px;align-items:start">
    <div class="panel">
      <h3 style="margin:0 0 10px">Today's ranking</h3>
      <div id="today-board"><span class="empty-hint">Loading…</span></div>
    </div>

    <div class="panel">
      <h3 style="margin:0 0 10px">All-time standings</h3>
      <div id="overall-board" class="table-scroll"><span class="empty-hint">Loading…</span></div>
    </div>
  </div>
</main>

<script type="module">
import { renderNav, api, esc, wim, fmtW, toast } from "/static/wim.js";
renderNav("/players");

const RANK_MEDALS = ["🥇", "🥈", "🥉"];

function rankBadge(i) {
  return RANK_MEDALS[i] || `#${i + 1}`;
}

async function loadToday() {
  const box = document.getElementById("today-board");
  try {
    const { entries } = await api("GET", "/api/deals/today");
    box.innerHTML = entries.length
      ? entries.map((e, i) => `
          <div class="rank-row${e.mine ? " mine" : ""}">
            <span class="rank-badge">${rankBadge(i)}</span>
            <span class="rank-name">${esc(e.name)}</span>
            <span class="rank-total">${wim(e.total_cents)}</span>
            <span class="rank-dist">${e.distance_cents === 0 ? "exact!" : `±W$${(e.distance_cents / 100).toFixed(2)}`}</span>
          </div>`).join("")
      : `<span class="empty-hint">Nobody has logged a deal today yet — be the first.</span>`;
  } catch (err) { toast(err.message, true); }
}

async function loadOverall() {
  const box = document.getElementById("overall-board");
  try {
    const rows = await api("GET", "/api/deals/leaderboard");
    box.innerHTML = rows.length
      ? `<table class="admin">
          <tr><th></th><th>Player</th><th>Avg distance</th><th>Days</th><th>Streak</th></tr>
          ${rows.map((r, i) => `
            <tr>
              <td>${rankBadge(i)}</td>
              <td>${esc(r.name)}</td>
              <td>${r.avg_distance_cents === 0 ? "exact!" : `±W$${(r.avg_distance_cents / 100).toFixed(2)}`}</td>
              <td>${r.days_submitted}/${r.days_tracked}</td>
              <td>${r.streak > 0 ? `&#128293; ${r.streak}` : "–"}</td>
            </tr>`).join("")}
        </table>`
      : `<span class="empty-hint">No one has logged a Daily Deal yet.</span>`;
  } catch (err) { toast(err.message, true); }
}

loadToday();
loadOverall();
</script>
</body>
</html>
